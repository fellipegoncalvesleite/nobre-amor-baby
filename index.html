<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pequeno Encanto - Roupas de bebê premium com tecidos macios e designs delicados. Confira nossa coleção de macacões de algodão orgânico, casaquinhos de tricô e looks adoráveis para recém-nascidos até 12 meses.">
    <meta name="theme-color" content="#F0DAE8">
    <title>Pequeno Encanto | Roupas de Bebê Premium</title>
    <script>
      try {
        var t = localStorage.getItem('nobre_amor_v1_theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme:dark)').matches)) {
          document.documentElement.classList.add('dark');
          document.querySelector('meta[name="theme-color"]').content = '#1C1720';
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
